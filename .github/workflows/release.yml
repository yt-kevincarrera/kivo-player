name: Release APKs

# Publishes downloadable APKs whenever a version tag is pushed, e.g.:
#   git tag v1.0.1 && git push origin v1.0.1
# Uses the in-Actions GITHUB_TOKEN (which has write access), so it works
# regardless of which account pushed the tag.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.8
          channel: stable
          cache: true

      - run: flutter pub get

      - run: flutter build apk --release --split-per-abi

      - name: Name the APKs after the tag
        run: |
          cd build/app/outputs/flutter-apk
          v="${GITHUB_REF_NAME}"
          mv app-arm64-v8a-release.apk   "kivo-${v}-arm64-v8a.apk"
          mv app-armeabi-v7a-release.apk "kivo-${v}-armeabi-v7a.apk"
          mv app-x86_64-release.apk      "kivo-${v}-x86_64.apk"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/kivo-*.apk
          generate_release_notes: true
          fail_on_unmatched_files: true
